<div class="customer-create-container">
  <header class="page-header">
    <a [routerLink]="returnToOrderNew ? ['/orders/new'] : ['/customers']" class="back-link">{{ returnToOrderNew ? '← Back to Order' : '← Back to Customers' }}</a>
    <h1>Create New Customer</h1>
    <p *ngIf="returnToOrderNew" class="return-hint">After saving, you'll be returned to the order form with this customer selected.</p>
  </header>

  <div *ngIf="error" class="error-message">
    <p>{{ error }}</p>
  </div>

  <form (ngSubmit)="submit()" class="customer-form">
    <div class="form-section">
      <h2>Company &amp; Contact</h2>
      <div class="form-grid">
        <div class="form-group full-width">
          <label>Company Name *</label>
          <input type="text" [(ngModel)]="customer.companyName" name="companyName" required placeholder="Acme Corp">
        </div>
        <div class="form-group full-width">
          <label>Display Name</label>
          <input type="text" [(ngModel)]="customer.displayName" name="displayName" placeholder="Acme">
        </div>
        <div class="form-group">
          <label>Email *</label>
          <input type="email" [(ngModel)]="customer.email" name="email" required placeholder="billing@acme.com">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" [(ngModel)]="customer.phone" name="phone" placeholder="+39 02 1234567">
        </div>
        <div class="form-group">
          <label>Tax ID</label>
          <input type="text" [(ngModel)]="customer.taxId" name="taxId" placeholder="IT12345678901">
        </div>
        <div class="form-group">
          <label>VAT Number</label>
          <input type="text" [(ngModel)]="customer.vatNumber" name="vatNumber" placeholder="IT12345678901">
        </div>
        <div class="form-group">
          <label>Language</label>
          <select [(ngModel)]="customer.preferredLanguage" name="preferredLanguage">
            <option value="en">English</option>
            <option value="it">Italiano</option>
            <option value="de">Deutsch</option>
            <option value="fr">Français</option>
          </select>
        </div>
        <div class="form-group">
          <label>Currency</label>
          <select [(ngModel)]="customer.preferredCurrency" name="preferredCurrency">
            <option value="EUR">EUR</option>
            <option value="USD">USD</option>
            <option value="GBP">GBP</option>
          </select>
        </div>
        <div class="form-group full-width">
          <label>Notes</label>
          <textarea [(ngModel)]="customer.notes" name="notes" rows="2" placeholder="Internal notes..."></textarea>
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-header">
        <h2>Billing Address</h2>
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="includeBilling" name="includeBilling">
          Include billing address
        </label>
      </div>
      <div *ngIf="includeBilling" class="form-grid address-grid">
        <div class="form-group full-width">
          <label>Recipient Name *</label>
          <input type="text" [(ngModel)]="billingAddress.recipientName" name="billingRecipient" required>
        </div>
        <div class="form-group full-width">
          <label>Address Line 1 *</label>
          <input type="text" [(ngModel)]="billingAddress.addressLine1" name="billingLine1" required>
        </div>
        <div class="form-group full-width">
          <label>Address Line 2</label>
          <input type="text" [(ngModel)]="billingAddress.addressLine2" name="billingLine2">
        </div>
        <div class="form-group">
          <label>City *</label>
          <input type="text" [(ngModel)]="billingAddress.city" name="billingCity" required>
        </div>
        <div class="form-group">
          <label>State/Province</label>
          <input type="text" [(ngModel)]="billingAddress.stateOrProvince" name="billingState">
        </div>
        <div class="form-group">
          <label>Postal Code *</label>
          <input type="text" [(ngModel)]="billingAddress.postalCode" name="billingPostal" required>
        </div>
        <div class="form-group">
          <label>Country *</label>
          <input type="text" [(ngModel)]="billingAddress.countryCode" name="billingCountry" required maxlength="3" placeholder="IT">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" [(ngModel)]="billingAddress.phoneNumber" name="billingPhone">
        </div>
      </div>
    </div>

    <div class="form-section">
      <div class="section-header">
        <h2>Shipping Address</h2>
        <label class="checkbox-label">
          <input type="checkbox" [(ngModel)]="includeShipping" name="includeShipping">
          Include shipping address
        </label>
      </div>
      <div *ngIf="includeShipping" class="form-grid address-grid">
        <div class="form-group full-width">
          <label>Recipient Name *</label>
          <input type="text" [(ngModel)]="shippingAddress.recipientName" name="shipRecipient" required>
        </div>
        <div class="form-group full-width">
          <label>Address Line 1 *</label>
          <input type="text" [(ngModel)]="shippingAddress.addressLine1" name="shipLine1" required>
        </div>
        <div class="form-group full-width">
          <label>Address Line 2</label>
          <input type="text" [(ngModel)]="shippingAddress.addressLine2" name="shipLine2">
        </div>
        <div class="form-group">
          <label>City *</label>
          <input type="text" [(ngModel)]="shippingAddress.city" name="shipCity" required>
        </div>
        <div class="form-group">
          <label>State/Province</label>
          <input type="text" [(ngModel)]="shippingAddress.stateOrProvince" name="shipState">
        </div>
        <div class="form-group">
          <label>Postal Code *</label>
          <input type="text" [(ngModel)]="shippingAddress.postalCode" name="shipPostal" required>
        </div>
        <div class="form-group">
          <label>Country *</label>
          <input type="text" [(ngModel)]="shippingAddress.countryCode" name="shipCountry" required maxlength="3" placeholder="IT">
        </div>
        <div class="form-group">
          <label>Phone</label>
          <input type="text" [(ngModel)]="shippingAddress.phoneNumber" name="shipPhone">
        </div>
      </div>
    </div>

    <div class="form-actions">
      <a routerLink="/customers" class="btn btn-secondary">Cancel</a>
      <button type="submit" [disabled]="saving" class="btn btn-primary">
        {{ saving ? 'Creating...' : 'Create Customer' }}
      </button>
    </div>
  </form>
</div>
