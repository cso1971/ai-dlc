  gitlab-runner:
    image: gitlab/gitlab-runner:latest
    depends_on:
      gitlab:
        condition: service_healthy
    volumes:
      - runner_config:/etc/gitlab-runner
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - devops

  webhook:
    build:
      context: ./packages/webhook-server
    ports:
      - "8000:8000"
    depends_on:
      gitlab:
        condition: service_healthy
    volumes:
      - webhook_sessions:/app/sessions
    environment:
      GITLAB_TOKEN: ${GITLAB_TOKEN}
      GITLAB_BOT_TOKEN: ${GITLAB_BOT_TOKEN}
      GITLAB_API_URL: http://gitlab:80/api/v4
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TRIGGER_LABEL: Breakdown
      SESSIONS_DIR: /app/sessions
    networks:
      - devops
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  log-viewer:
    build:
      context: ./packages/log-viewer
      args:
        VITE_WEBHOOK_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      webhook:
        condition: service_healthy
    networks:
      - devops

volumes:
  gitlab_config:
  gitlab_logs:
  gitlab_data:
  runner_config:
  webhook_sessions:
  # n8n_postgres_data:
  # n8n_data:

networks:
  devops:
    driver: bridge
