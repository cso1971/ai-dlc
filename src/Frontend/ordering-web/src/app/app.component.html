<div class="app-container">
  <nav class="navbar">
    <div class="navbar-brand">
      <a routerLink="/" class="logo">
        <span class="logo-icon">📦</span>
        <span class="logo-text">Distributed Playground</span>
      </a>
    </div>
    <div class="navbar-menu">
      <app-queue-stats></app-queue-stats>
      <a routerLink="/orders" routerLinkActive="active" class="nav-link">Orders</a>
      <a routerLink="/orders/new" class="nav-link btn-new">+ New Order</a>
      <a routerLink="/customers" routerLinkActive="active" class="nav-link">Customers</a>
      <a routerLink="/customers/new" class="nav-link btn-new">+ New Customer</a>
      <span class="nav-user" *ngIf="username">{{ username }}</span>
      <button type="button" class="nav-link btn-logout" (click)="logout()">Logout</button>
    </div>
  </nav>

  <main class="main-content">
    <router-outlet></router-outlet>
  </main>

  <footer class="footer">
    <p>Distributed Playground - Orders &amp; Customers</p>
  </footer>
</div>

<!-- AI Chat Assistant - Always visible -->
<app-ai-chat></app-ai-chat>
